# Compose file for managing multiple containers through the docker internal network

services:

  # Backend container for Spring Boot
  # Uses image eclipse-temurin:17
  # .env file needs to be in the same folder as the compose file

  backend:
    build: ./backend
    container_name: notes_app_backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    env_file:
      - .env

  # Database container for MySQL
  # MySQL connection is established through port 3306

  mysql:
    image: mysql:9
    container_name: notes_mysql

    restart: always

    environment:
      - 'MYSQL_DATABASE=${SPRING_DATASOURCE_DBNAME}'
      - 'MYSQL_PASSWORD=${SPRING_DATASOURCE_PASSWORD}'
      - 'MYSQL_ROOT_PASSWORD=${SPRING_DATASOURCE_ROOT_PASSWD}'
      - 'MYSQL_USER=${SPRING_USER}'

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql


volumes:
  mysql_data: