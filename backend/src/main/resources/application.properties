# Name of the application
spring.application.name=NotesApp

# Hibernate automatically updates the DB schema
spring.jpa.hibernate.ddl-auto=update

# Write the SQL queries to the console output
spring.jpa.show-sql=true

# Docker DB container runs on mysql and not localhost
spring.datasource.url=jdbc:mysql://localhost:3306/notes_db

# Sensitive data from .env file
spring.datasource.username=${SPRING_USER}
spring.datasource.password=${SPRING_PASSWORD}

# JWT secret key
security.jwt.secret-key=Omolko123

